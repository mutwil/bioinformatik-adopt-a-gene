name: Render & publish Quarto Live to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages for the knitr engine
        run: Rscript -e 'install.packages(c("rmarkdown", "knitr"))'

      - name: Add the quarto-live (webR) extension
        run: |
          # Move project files aside so `quarto add` doesn't parse index.qmd's
          # include directive before the extension exists (chicken-and-egg).
          mkdir -p .qbak && mv index.qmd _quarto.yml .qbak/
          quarto add r-wasm/quarto-live --no-prompt
          mv .qbak/index.qmd .qbak/_quarto.yml ./ && rmdir .qbak
          test -f _extensions/r-wasm/live/_knitr.qmd && echo "extension installed OK"

      - name: Render site
        run: quarto render

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
